<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>历史练习</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5b6776;
      --line: rgba(116, 139, 166, 0.28);
      --paper: rgba(255, 255, 255, 0.72);
      --accent: #1d4ed8;
      --neutral: #64748b;
      --shadow: 0 10px 24px rgba(30, 41, 59, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(135deg, #eef6ff 0%, #f6fbf5 46%, #fff7e8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.35;
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .back-link {
      color: var(--accent);
      font-size: 13px;
      font-weight: 850;
      text-decoration: none;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .date-card {
      min-height: 56px;
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid rgba(116, 139, 166, 0.5);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(248, 250, 252, 0.96), rgba(255, 255, 255, 0.72));
      color: #334155;
      box-shadow: 0 10px 22px rgba(30, 41, 59, 0.06);
      font-size: 16px;
      font-weight: 950;
      text-decoration: none;
    }
    .date-card.latest {
      border-color: rgba(29, 78, 216, 0.42);
      background: linear-gradient(135deg, rgba(239, 246, 255, 0.96), rgba(255, 255, 255, 0.72));
    }
    .latest-date {
      color: var(--accent);
      font-weight: 950;
    }
    .empty {
      margin: 0;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      main { margin: 14px auto; padding: 14px; }
      .hero { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div>
        <h1>历史练习</h1>
        <p>按日期归档每次生成的今日练习和今日复习，进入后查看学生作答和老师答案。</p>
      </div>
      <a class="back-link" href="../index.html">返回首页</a>
    </div>
    <div class="grid">
      <a class="date-card latest" href="2026-06-01/index.html"><span class="latest-date">2026-06-01</span></a>
      <a class="date-card" href="2026-05-29/index.html">2026-05-29</a>

      <a class="date-card" href="2026-05-27/index.html">2026-05-27</a>
      <a class="date-card" href="2026-05-26/index.html">2026-05-26</a>
      <a class="date-card" href="2026-05-25/index.html">2026-05-25</a>
      <a class="date-card" href="2026-05-22/index.html">2026-05-22</a>
      <a class="date-card" href="2026-05-21/index.html">2026-05-21</a>
      <a class="date-card" href="2026-05-20/index.html">2026-05-20</a>
      <a class="date-card" href="2026-05-19/index.html">2026-05-19</a>
      <a class="date-card" href="2026-05-18/index.html">2026-05-18</a>
      <a class="date-card" href="2026-05-15/index.html">2026-05-15</a>

      <a class="date-card" href="2026-05-08/index.html">2026-05-08</a>
    </div>
  </main>
</body>
</html>
