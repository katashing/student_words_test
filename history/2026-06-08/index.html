<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026-06-08 历史练习</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5b6776;
      --line: rgba(116, 139, 166, 0.28);
      --paper: rgba(255, 255, 255, 0.72);
      --daily: #f59e0b;
      --passed: #16a34a;
      --shadow: 0 10px 24px rgba(30, 41, 59, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(135deg, #eef6ff 0%, #f6fbf5 46%, #fff7e8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.35;
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .back-link {
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 850;
      text-decoration: none;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .card {
      min-height: 92px;
      padding: 11px 12px;
      border: 1px solid rgba(116, 139, 166, 0.34);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 10px 22px rgba(30, 41, 59, 0.06);
      text-decoration: none;
    }
    .card.daily {
      border-color: rgba(245, 158, 11, 0.64);
      background: linear-gradient(135deg, rgba(255, 247, 214, 0.96), rgba(255, 255, 255, 0.72));
      color: #92400e;
    }
    .card.review {
      border-color: rgba(22, 163, 74, 0.52);
      background: linear-gradient(135deg, rgba(239, 250, 242, 0.96), rgba(255, 255, 255, 0.72));
      color: #166534;
    }
    .label {
      display: block;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 950;
    }
    .meta {
      display: block;
      margin-top: 5px;
      color: currentColor;
      font-size: 12px;
      font-weight: 800;
      opacity: 0.78;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      main { margin: 14px auto; padding: 14px; }
      .hero { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div>
        <h1>2026-06-08 历史练习</h1>
        <p>进入学生作答或老师答案页面，打开后可直接打印（Ctrl + P）。</p>
      </div>
      <a class="back-link" href="../index.html">返回历史列表</a>
    </div>
    <div class="grid">
      <a class="card daily" href="daily_practice_student.html?v=2026-06-08"><span class="label">今日练习</span><span class="meta">学生作答</span></a>
      <a class="card daily" href="daily_practice_teacher.html?v=2026-06-08"><span class="label">今日练习</span><span class="meta">老师答案</span></a>
      <a class="card review" href="passed_review_student.html?v=2026-06-08"><span class="label">今日复习</span><span class="meta">学生作答</span></a>
      <a class="card review" href="passed_review_teacher.html?v=2026-06-08"><span class="label">今日复习</span><span class="meta">老师答案</span></a>
    </div>
  </main>
</body>
</html>
