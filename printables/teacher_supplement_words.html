<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>总表（老师+补充建议）</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1f2933;
      background: #f7f9fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }
    main {
      width: min(760px, calc(100vw - 32px));
      padding: 28px;
      background: #fff;
      border: 1px solid #d9e2ec;
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { margin: 0 0 18px; color: #52606d; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    a {
      display: block;
      padding: 14px;
      border: 1px solid #d9e2ec;
      color: #1f2933;
      font-weight: 800;
      text-decoration: none;
      background: #fff;
    }
    .file {
      display: block;
      margin-top: 6px;
      color: #52606d;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      font-weight: 400;
      overflow-wrap: anywhere;
    }
    .summary {
      display: block;
      margin-top: 8px;
      color: #52606d;
      font-size: 14px;
      font-weight: 600;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
