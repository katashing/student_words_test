<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>总表（老师 + 补充建议）：共 418 项</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5b6776;
      --line: rgba(116, 139, 166, 0.28);
      --paper: rgba(255, 255, 255, 0.72);
      --pending: #dc2626;
      --passed: #16a34a;
      --neutral: #64748b;
      --shadow: 0 14px 32px rgba(30, 41, 59, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #eef6ff 0%, #f6fbf5 46%, #fff7e8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 48px auto;
      padding: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    h1 { margin: 0 0 8px; font-size: 30px; line-height: 1.2; }
    .title-count {
      margin-left: 8px;
      color: var(--ink);
      font-size: 0.72em;
      font-weight: 900;
      white-space: nowrap;
    }
    p { margin: 0 0 22px; color: var(--muted); font-weight: 650; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    a {
      position: relative;
      display: block;
      min-height: 78px;
      padding: 18px 34px 16px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: 0 12px 30px rgba(30, 41, 59, 0.07);
    }
    a::after {
      content: ">";
      position: absolute;
      right: 18px;
      top: 20px;
      color: currentColor;
      font-weight: 900;
    }
    a.pending-link {
      border-color: var(--pending);
      background: linear-gradient(135deg, rgba(255, 241, 241, 0.88), rgba(255, 255, 255, 0.62));
      color: #9f1239;
    }
    a.passed-link {
      border-color: var(--passed);
      background: linear-gradient(135deg, rgba(239, 250, 242, 0.9), rgba(255, 255, 255, 0.62));
      color: #166534;
    }
    a.teacher-link {
      border-color: var(--neutral);
      background: linear-gradient(135deg, rgba(248, 250, 252, 0.92), rgba(255, 255, 255, 0.62));
      color: #334155;
    }
    a.total-link {
      border-color: var(--neutral);
      background: linear-gradient(135deg, rgba(248, 250, 252, 0.92), rgba(255, 255, 255, 0.62));
      color: #334155;
    }
    .summary {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }
    .inline-summary {
      display: block;
      margin-top: 6px;
      margin-left: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }
    a.pending-link .summary { color: #be123c; }
    a.pending-link .inline-summary { color: #be123c; }
    a.passed-link .summary { color: #15803d; }
    a.passed-link .inline-summary { color: #15803d; }
    a.teacher-link .summary {
      color: #475569;
    }
    a.teacher-link .inline-summary {
      color: #475569;
    }
    a.total-link .summary {
      color: #475569;
    }
    a.total-link .inline-summary {
      color: #475569;
    }
    @media (max-width: 720px) {
      main { margin: 20px auto; padding: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>总表（老师 + 补充建议）：<span class="title-count">共 418 项</span></h1>
    <p>这里按练习类型拆成四个总表入口，包含老师要求词、课本、练习册和写作材料中的补充建议词。</p>
    <div class="grid">
      <a class="total-link" href="total_english_spelling.html">英语默写：<span class="inline-summary">41 项</span></a>
      <a class="total-link" href="total_english_recognition.html">英语认读：<span class="inline-summary">184 项</span></a>
      <a class="total-link" href="total_math_spelling.html">数学默写：<span class="inline-summary">59 项</span></a>
      <a class="total-link" href="total_math_recognition.html">数学认读：<span class="inline-summary">134 项</span></a>
    </div>
  </main>
</body>
</html>
