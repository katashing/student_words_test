    body {

      line-height: 1.5;
    }

    h1 { margin: 0 0 8px; font-size: 26px; }

    .grid {

    a.pending-link {

      color: #9f1239;
    }
    a.passed-link {
      border: 2px solid #22c55e;
      background: #f3fbf5;
      color: #166534;
    }
    a.teacher-link {
      border: 2px solid #94a3b8;
      background: #f8fafc;
      color: #334155;
    }
    a.total-link {
      border: 2px solid #94a3b8;
      background: #f8fafc;
      color: #334155;
    }
    .summary {
      display: block;
      margin-top: 8px;
      color: #52606d;
      font-size: 14px;
      font-weight: 600;
    }
    a.pending-link .summary { color: #be123c; }
    a.passed-link .summary { color: #15803d; }
    a.teacher-link .summary {
      color: #475569;
    }
    a.total-link .summary {
      color: #475569;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
