<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>中文面试问题 学生版</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5b6776;
      --line: #d8e1ea;
      --soft: #f7fafc;
      --accent: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: #eef2f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 12px auto;
      padding: 12mm 11mm;
      background: #fff;
      page-break-after: always;
    }
    h1 { margin: 0 0 4px; font-size: 26px; }
    .meta { margin-bottom: 8px; color: var(--muted); font-size: 13px; font-weight: 700; }
    .sheet-info {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 8px 0 14px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
    }
    .sheet-info span {
      padding-bottom: 5px;
      border-bottom: 1px solid var(--line);
    }
    h2 {
      margin: 15px 0 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--ink);
      font-size: 18px;
    }
    .section-note {
      margin: -1px 0 10px;
      padding: 8px 10px;
      border-left: 4px solid var(--accent);
      background: #eff6ff;
      color: #1e3a8a;
      font-weight: 800;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-bottom: 10px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 7px;
      vertical-align: top;
    }
    th { background: var(--soft); font-weight: 900; }
    .qa-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .qa-card {
      min-height: 92px;
      border: 1px solid var(--line);
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .question-line {
      padding: 6px 8px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      font-weight: 900;
    }
    .answer-line {
      padding: 8px 8px 10px;
      color: #0f766e;
      font-size: 15px;
      font-weight: 800;
    }
    .answer-line strong {
      color: #dc2626;
      font-weight: 900;
    }
    .picture-prompt {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      text-align: center;
    }
    .picture-prompt img {
      display: block;
      width: 80%;
      height: auto;
      max-width: 80%;
      margin: 0 auto;
    }
    .answer-blank {
      display: block;
      height: 34px;
      border-bottom: 1px solid #94a3b8;
    }
    .picture-card .answer-blank { height: 28px; }
    .empty-note {
      padding: 22px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      font-weight: 800;
    }
    @page { size: A4; margin: 0; }
    @media print {
      body { background: #fff; }
      .page { margin: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>中文面试问题（学生版）</h1>
    <p class="meta">每题下方留空作答。</p>
    <div class="sheet-info">
      <span>姓名：孙大圣</span>
      <span>日期：　　　　　</span>
      <span>用时：　　　　　</span>
    </div>
    <div class="empty-note">暂未整理中文面试题。后续老师提供材料后，会在这里归档并生成可打印版本。</div>
  </main>
</body>
</html>
