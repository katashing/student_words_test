<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>待练错题库：英语默写</title>
  <style>
    body {
      margin: 0;
      color: #1f2933;
      font-family: "PingFang SC", "Microsoft YaHei", "Heiti SC", Arial, sans-serif;
      background: #f7f9fb;
      font-size: 14px;
      line-height: 1.45;
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }
    h1 { margin: 0 0 6px; font-size: 26px; }
    h2 {
      margin: 24px 0 8px;
      padding-bottom: 5px;
      border-bottom: 2px solid #d9e2ec;
      font-size: 19px;
    }
    p { margin: 0 0 16px; color: #52606d; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border: 1px solid #d9e2ec;
      padding: 7px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      background: #eef2f6;
      z-index: 1;
    }
    .word { font-family: Arial, Helvetica, "PingFang SC", sans-serif; font-weight: 800; }
    .count { text-align: right; white-space: nowrap; }
    .example { min-width: 260px; font-family: Arial, Helvetica, "PingFang SC", sans-serif; }
    .empty {
      padding: 18px;
      border: 1px solid #d9e2ec;
      background: #fff;
      color: #52606d;
    }
    @media print {
      body { background: #fff; }
      main { width: auto; padding: 0; }
      th { position: static; }
      h2 { page-break-after: avoid; }
      table { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <main>
    <h1>待练错题库：英语默写</h1>
    <p>这份表收录英语默写中尚未做过，或已测试但还未掌握的词。待练 2/144 项。 整理日期：2026-06-16</p>
    <h2>phrase 短语（2 项）</h2>
    <table>
      <thead>
        <tr>
          <th>单词/词组</th>
          <th>中文意思</th>
          <th>简单例句/说明</th>
          <th>出现来源</th>
          <th>频次</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="word">Christmas Eve</td>
          <td>平安夜</td>
          <td class="example">I can use <strong>Christmas Eve</strong> in class.</td>
          <td>老师</td>
          <td class="count"></td>
        </tr>
        <tr>
          <td class="word">good night</td>
          <td>晚安</td>
          <td class="example">I say <strong>good night</strong> before bed.</td>
          <td>老师</td>
          <td class="count"></td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
