<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>老师上传入口</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5b6776;
      --line: rgba(116, 139, 166, 0.28);
      --paper: rgba(255, 255, 255, 0.78);
      --accent: #1d4ed8;
      --danger: #b91c1c;
      --ok: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #eef6ff 0%, #f6fbf5 52%, #fff7e8 100%);
      min-height: 100vh;
    }
    main {
      width: min(720px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.25;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
      font-weight: 650;
    }
    form {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 12px 28px rgba(30, 41, 59, 0.08);
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 14px;
      font-weight: 900;
    }
    input,
    select,
    textarea,
    button {
      width: 100%;
      border: 1px solid rgba(116, 139, 166, 0.36);
      border-radius: 8px;
      font: inherit;
    }
    input,
    select,
    textarea {
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.86);
    }
    textarea {
      min-height: 88px;
      resize: vertical;
    }
    button {
      padding: 12px 14px;
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-weight: 800;
    }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    .back {
      display: inline-block;
      margin-top: 16px;
      color: var(--accent);
      font-weight: 900;
      text-decoration: none;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
    }
    .file-info {
      margin-top: -4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>老师上传入口</h1>
    <p>请选择分类并上传图片。支持一次选择多张图片。</p>
    <form id="uploadForm">
      <label>
        上传接口地址
        <input name="endpoint" id="endpoint" type="url" required />
      </label>
      <div class="hint">可填写你自己的服务器地址（例如 `https://your-domain/upload`）。系统会记住这个地址。</div>
      <label>
        上传密码
        <input name="password" type="password" autocomplete="current-password" required />
      </label>
      <label>
        分类
        <select name="category" required>
          <option value="english_spelling">英语默写</option>
          <option value="english_recognition">英语认读</option>
          <option value="math_spelling">数学默写</option>
          <option value="math_recognition">数学认读</option>
          <option value="daily_corrections">已批改作业</option>
          <option value="other">其他</option>
        </select>
      </label>
      <label>
        备注
        <textarea name="note" placeholder="可写日期、学生情况或补充说明"></textarea>
      </label>
      <label>
        图片
        <input name="files" id="files" type="file" accept="image/*" multiple required />
      </label>
      <div id="fileInfo" class="file-info">未选择文件</div>
      <button type="submit">上传</button>
      <div id="status" class="status"></div>
    </form>
    <a class="back" href="index.html">返回首页</a>
  </main>
  <script>
    const DEFAULT_ENDPOINT = "https://teacher-upload.43.128.89.2.sslip.io/upload";
    const ENDPOINT_KEY = "teacher_upload_endpoint";
    const form = document.getElementById("uploadForm");
    const statusEl = document.getElementById("status");
    const endpointEl = document.getElementById("endpoint");
    const filesEl = document.getElementById("files");
    const fileInfoEl = document.getElementById("fileInfo");

    endpointEl.value = localStorage.getItem(ENDPOINT_KEY) || DEFAULT_ENDPOINT;

    filesEl.addEventListener("change", () => {
      const files = Array.from(filesEl.files || []);
      if (!files.length) {
        fileInfoEl.textContent = "未选择文件";
        return;
      }
      const total = files.reduce((sum, file) => sum + (file.size || 0), 0);
      const names = files.slice(0, 3).map((file) => file.name).join("、");
      const more = files.length > 3 ? ` 等 ${files.length} 张` : "";
      fileInfoEl.textContent = `已选 ${files.length} 张，约 ${(total / 1024 / 1024).toFixed(2)} MB：${names}${more}`;
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = form.querySelector("button");
      const formData = new FormData(form);
      const endpoint = String(formData.get("endpoint") || "").trim();
      if (!endpoint) {
        statusEl.className = "status error";
        statusEl.textContent = "请填写上传接口地址";
        return;
      }
      button.disabled = true;
      statusEl.className = "status";
      statusEl.textContent = "正在上传...";
      try {
        const password = String(formData.get("password") || "");
        localStorage.setItem(ENDPOINT_KEY, endpoint);
        const response = await fetch(endpoint, {
          method: "POST",
          headers: {
            "x-upload-password": password
          },
          body: formData
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.error || "上传失败");
        }
        statusEl.className = "status ok";
        statusEl.textContent = `上传成功：${result.count || 0} 个文件`;
        const savedEndpoint = endpointEl.value;
        form.reset();
        endpointEl.value = savedEndpoint;
        fileInfoEl.textContent = "未选择文件";
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = error.message || "上传失败";
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
