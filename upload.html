<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>老师上传入口</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5b6776;
      --line: rgba(116, 139, 166, 0.28);
      --paper: rgba(255, 255, 255, 0.78);
      --accent: #1d4ed8;
      --danger: #b91c1c;
      --ok: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #eef6ff 0%, #f6fbf5 52%, #fff7e8 100%);
      min-height: 100vh;
    }
    main {
      width: min(720px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.25;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
      font-weight: 650;
    }
    form {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 12px 28px rgba(30, 41, 59, 0.08);
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 14px;
      font-weight: 900;
    }
    input,
    select,
    textarea,
    button {
      width: 100%;
      border: 1px solid rgba(116, 139, 166, 0.36);
      border-radius: 8px;
      font: inherit;
    }
    input,
    select,
    textarea {
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.86);
    }
    textarea {
      min-height: 88px;
      resize: vertical;
    }
    button {
      padding: 12px 14px;
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-weight: 800;
    }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    .back {
      display: inline-block;
      margin-top: 16px;
      color: var(--accent);
      font-weight: 900;
      text-decoration: none;
    }
    .file-info {
      margin-top: -4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .file-types {
      margin-top: -8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }
    .uploaded {
      display: none;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(21, 128, 61, 0.24);
      border-radius: 8px;
      background: rgba(240, 253, 244, 0.72);
    }
    .uploaded.active {
      display: grid;
    }
    .uploaded-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      color: var(--ok);
      font-weight: 900;
    }
    .uploaded-meta {
      white-space: nowrap;
      font-size: 12px;
      color: rgba(21, 128, 61, 0.78);
      font-weight: 800;
    }
    .uploaded-empty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .uploaded-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(116, 139, 166, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
    }
    .uploaded-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 13px;
      font-weight: 800;
    }
    .uploaded-state {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .delete-file {
      width: auto;
      min-width: 58px;
      padding: 7px 10px;
      border-color: rgba(185, 28, 28, 0.28);
      background: rgba(254, 242, 242, 0.92);
      color: var(--danger);
      font-size: 12px;
    }
    .delete-file:disabled {
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main>
    <h1>老师上传入口</h1>
    <form id="uploadForm">
      <label>
        分类
        <select name="category" required>
          <option value="english_homework">英语作业</option>
          <option value="math_homework">数学作业</option>
          <option value="english_words">英语单词</option>
          <option value="math_words">数学单词</option>
          <option value="english_interview">英文面试</option>
          <option value="chinese_interview">中文面试</option>
          <option value="mixed">混合分类（多种种类合并，需标注清楚类别）</option>
        </select>
      </label>
      <label>
        备注
        <textarea name="note" placeholder="如文件中无法识别具体分类，可补充具体分类，或其他备注信息。"></textarea>
      </label>
      <label>
        文件
        <input name="files" id="files" type="file" accept=".doc,.docx,.xls,.xlsx,.csv,.pdf,.txt,.jpg,.jpeg,.png,.webp,.gif,.bmp,.tif,.tiff,.heic,.heif,image/*" multiple required />
      </label>
      <div class="file-types">支持文件类型：Word、Excel、PDF、txt、图片；可一次选择多份。</div>
      <div id="fileInfo" class="file-info">未选择文件</div>
      <button type="submit">上传</button>
      <div id="status" class="status"></div>
      <section id="uploadedList" class="uploaded" aria-live="polite"></section>
    </form>
    <a class="back" href="index.html">返回首页</a>
  </main>
  <script>
    const UPLOAD_URL = "https://teacher-upload.43.128.89.2.sslip.io/upload";
    const form = document.getElementById("uploadForm");
    const statusEl = document.getElementById("status");
    const filesEl = document.getElementById("files");
    const fileInfoEl = document.getElementById("fileInfo");
    const uploadedListEl = document.getElementById("uploadedList");

    loadTodayUploads();

    filesEl.addEventListener("change", () => {
      const files = Array.from(filesEl.files || []);
      if (!files.length) {
        fileInfoEl.textContent = "未选择文件";
        return;
      }
      const total = files.reduce((sum, file) => sum + (file.size || 0), 0);
      const names = files.slice(0, 3).map((file) => file.name).join("、");
      const more = files.length > 3 ? ` 等 ${files.length} 份` : "";
      fileInfoEl.textContent = `已选 ${files.length} 份，约 ${(total / 1024 / 1024).toFixed(2)} MB：${names}${more}`;
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = form.querySelector("button");
      const formData = new FormData(form);
      const selectedFiles = Array.from(filesEl.files || []).map((file) => ({
        originalName: file.name,
        size: file.size || 0
      }));
      button.disabled = true;
      statusEl.className = "status";
      statusEl.textContent = "正在上传...";
      try {
        const response = await fetch(UPLOAD_URL, {
          method: "POST",
          body: formData
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.error || "上传失败");
        }
        statusEl.className = "status ok";
        statusEl.textContent = `上传成功：${result.count || 0} 个文件`;
        const refreshed = await loadTodayUploads();
        if (!refreshed) renderUploadedFiles(mergeUploadedFiles(result.files || [], selectedFiles));
        form.reset();
        fileInfoEl.textContent = "未选择文件";
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = error.message || "上传失败";
      } finally {
        button.disabled = false;
      }
    });

    function mergeUploadedFiles(uploadedFiles, selectedFiles) {
      const merged = [...uploadedFiles];
      const seen = new Set(uploadedFiles.map((file) => readableFilename(file.originalName || file.name || "")));
      for (const selected of selectedFiles) {
        if (seen.has(selected.originalName)) continue;
        merged.push({
          originalName: selected.originalName,
          size: selected.size,
          pendingOnly: true
        });
      }
      return merged;
    }

    async function loadTodayUploads() {
      try {
        const response = await fetch(UPLOAD_URL, { method: "GET" });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "读取已上传文件失败");
        renderUploadedFiles(result.files || [], { showEmpty: true, day: result.day });
        return true;
      } catch {
        return false;
      }
    }

    function renderUploadedFiles(files, options = {}) {
      const updatedText = escapeHtml(latestUpdateText(files, options.day));
      if (!files.length) {
        if (options.showEmpty) {
          uploadedListEl.className = "uploaded active";
          uploadedListEl.innerHTML = `<div class="uploaded-title"><span>今日已上传文件</span><span class="uploaded-meta">（所有老师可见，可删除）${updatedText}</span></div><div class="uploaded-empty">今天还没有上传文件。</div>`;
        } else {
          uploadedListEl.className = "uploaded";
          uploadedListEl.innerHTML = "";
        }
        return;
      }
      uploadedListEl.className = "uploaded active";
      uploadedListEl.innerHTML = [
        `<div class="uploaded-title"><span>今日已上传文件</span><span class="uploaded-meta">（所有老师可见，可删除）${updatedText}</span></div>`,
        ...files.map((file, index) => {
          const label = escapeHtml(readableFilename(file.originalName || file.name || `文件 ${index + 1}`));
          const path = escapeHtml(file.deletePath || "");
          const pendingOnly = file.pendingOnly || !file.deletePath;
          const timeText = formatUploadTime(file.uploadedAt);
          const state = pendingOnly ? "已上传（待服务器返回删除信息）" : `${timeText ? `${timeText} ` : ""}已上传`;
          return `<div class="uploaded-item" data-delete-path="${path}">
            <div>
              <div class="uploaded-name">${label}</div>
              <div class="uploaded-state">${state}</div>
            </div>
            <button class="delete-file" type="button"${pendingOnly ? " disabled" : ""}>删除</button>
          </div>`;
        })
      ].join("");
    }

    uploadedListEl.addEventListener("click", async (event) => {
      const button = event.target.closest(".delete-file");
      if (!button) return;
      const item = button.closest(".uploaded-item");
      const deletePath = item ? item.dataset.deletePath : "";
      const stateEl = item ? item.querySelector(".uploaded-state") : null;
      if (!deletePath) return;

      button.disabled = true;
      if (stateEl) stateEl.textContent = "正在删除...";
      try {
        const response = await fetch(UPLOAD_URL, {
          method: "DELETE",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({ path: deletePath })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.error || "删除失败");
        }
        if (stateEl) stateEl.textContent = "已删除";
        button.textContent = "已删";
        await loadTodayUploads();
      } catch (error) {
        if (stateEl) stateEl.textContent = error.message || "删除失败";
        button.disabled = false;
      }
    });

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function readableFilename(value) {
      const raw = String(value || "");
      try {
        const bytes = Uint8Array.from(raw, (char) => char.charCodeAt(0) & 255);
        const decoded = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
        return /[\u3400-\u9fff]/.test(decoded) ? decoded : raw;
      } catch {
        return raw;
      }
    }

    function formatUploadTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function todayDateText() {
      const date = new Date();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function latestUpdateText(files, fallbackDay) {
      const timestamps = files
        .map((file) => new Date(file.uploadedAt || "").getTime())
        .filter((time) => !Number.isNaN(time));
      if (timestamps.length) {
        return `最近更新：${formatDateTime(new Date(Math.max(...timestamps)))}`;
      }
      return `最近更新：${fallbackDay || todayDateText()}`;
    }

    function formatDateTime(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${year}-${month}-${day} ${hours}:${minutes}`;
    }
  </script>
</body>
</html>
