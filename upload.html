<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>老师上传入口</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5b6776;
      --line: rgba(116, 139, 166, 0.28);
      --paper: rgba(255, 255, 255, 0.78);
      --accent: #1d4ed8;
      --accent-soft: rgba(14, 165, 233, 0.12);
      --danger: #b91c1c;
      --ok: #15803d;
      --shadow: 0 14px 32px rgba(30, 41, 59, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
      background: linear-gradient(135deg, #eef6ff 0%, #f6fbf5 52%, #fff7e8 100%);
    }
    main {
      width: min(980px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 34px;
    }
    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 0 14px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 28px;
      line-height: 1.2;
    }
    .hero-copy {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }
    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid rgba(29, 78, 216, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }
    .panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .settings-panel {
      margin-bottom: 14px;
    }
    .settings-form {
      display: grid;
      grid-template-columns: 1fr;
      align-items: end;
      gap: 12px;
    }
    .settings-groups {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .settings-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 0;
      padding: 12px;
      border: 1px solid rgba(116, 139, 166, 0.26);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.56);
    }
    .settings-group legend {
      padding: 0 6px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 950;
    }
    .settings-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      align-items: center;
      gap: 12px;
    }
    .settings-help {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }
    .settings-status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }
    .settings-status.ok { color: var(--ok); }
    .settings-status.error { color: var(--danger); }
    form {
      display: grid;
      gap: 14px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.35fr);
      gap: 12px;
    }
    label {
      display: grid;
      gap: 7px;
      color: #1f2933;
      font-size: 14px;
      font-weight: 950;
    }
    .wide {
      grid-column: 1 / -1;
    }
    input,
    select,
    textarea,
    button {
      width: 100%;
      border: 1px solid rgba(116, 139, 166, 0.36);
      border-radius: 8px;
      font: inherit;
    }
    input,
    select,
    textarea {
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.88);
    }
    textarea {
      min-height: 78px;
      resize: vertical;
    }
    .submit-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      align-items: center;
      gap: 12px;
    }
    button {
      padding: 12px 14px;
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 950;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-weight: 850;
    }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    .file-info {
      margin-top: -4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 750;
    }
    .file-info.error {
      color: var(--danger);
      font-weight: 900;
    }
    .file-types {
      margin-top: -8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.45;
    }
    .uploaded {
      display: none;
      gap: 8px;
      padding: 14px;
      border: 1px solid rgba(21, 128, 61, 0.24);
      border-radius: 8px;
      background: rgba(240, 253, 244, 0.72);
    }
    .uploaded.active {
      display: grid;
    }
    .uploaded-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      color: var(--ok);
      font-size: 18px;
      font-weight: 950;
    }
    .uploaded-meta {
      white-space: nowrap;
      font-size: 12px;
      color: rgba(21, 128, 61, 0.78);
      font-weight: 850;
    }
    .uploaded-empty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }
    .uploaded-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(116, 139, 166, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 20px rgba(30, 41, 59, 0.04);
    }
    .uploaded-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 14px;
      font-weight: 900;
    }
    .uploaded-state {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }
    .uploaded-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .view-file,
    .delete-file {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      min-width: 72px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 950;
      text-decoration: none;
    }
    .view-file {
      border: 1px solid rgba(29, 78, 216, 0.24);
      background: rgba(239, 246, 255, 0.92);
      color: var(--accent);
    }
    .view-file.disabled {
      opacity: 0.45;
      pointer-events: none;
    }
    .delete-file {
      border-color: rgba(185, 28, 28, 0.28);
      background: rgba(254, 242, 242, 0.92);
      color: var(--danger);
    }
    .delete-file:disabled {
      cursor: not-allowed;
    }
    @media (max-width: 720px) {
      main { width: min(100% - 18px, 980px); padding-top: 12px; }
      .hero { align-items: stretch; flex-direction: column; }
      .back { align-self: flex-start; }
      .panel { padding: 12px; }
      .settings-form { grid-template-columns: 1fr; }
      .settings-groups { grid-template-columns: 1fr; }
      .settings-group { grid-template-columns: 1fr; }
      .settings-actions { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .submit-row { grid-template-columns: 1fr; }
      .uploaded-title { align-items: flex-start; flex-direction: column; gap: 2px; }
      .uploaded-meta { white-space: normal; }
      .uploaded-item { grid-template-columns: 1fr; }
      .uploaded-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <div>
        <h1>老师上传入口</h1>
        <p class="hero-copy">上传作业批改、新词表或面试题，今日文件所有老师可见。</p>
      </div>
      <a class="back" href="index.html">返回首页</a>
    </header>
    <section class="panel settings-panel">
      <p class="settings-help">出题数量设置：老师可随时修改，保存后下一次生成练习页会按新数量出题。测试和复习分别设置四类题量。</p>
      <form id="settingsForm" class="settings-form">
        <div class="settings-groups">
          <fieldset class="settings-group">
            <legend>今日练习（单词）</legend>
            <label>
              英语默写
              <input name="dailyEnglishSpelling" type="number" min="0" max="200" step="1" value="15" required />
            </label>
            <label>
              英语认读
              <input name="dailyEnglishRecognition" type="number" min="0" max="200" step="1" value="30" required />
            </label>
            <label>
              数学默写
              <input name="dailyMathSpelling" type="number" min="0" max="200" step="1" value="15" required />
            </label>
            <label>
              数学认读
              <input name="dailyMathRecognition" type="number" min="0" max="200" step="1" value="30" required />
            </label>
          </fieldset>
          <fieldset class="settings-group">
            <legend>今日复习（单词）</legend>
            <label>
              英语默写
              <input name="reviewEnglishSpelling" type="number" min="0" max="200" step="1" value="5" required />
            </label>
            <label>
              英语认读
              <input name="reviewEnglishRecognition" type="number" min="0" max="200" step="1" value="5" required />
            </label>
            <label>
              数学默写
              <input name="reviewMathSpelling" type="number" min="0" max="200" step="1" value="5" required />
            </label>
            <label>
              数学认读
              <input name="reviewMathRecognition" type="number" min="0" max="200" step="1" value="5" required />
            </label>
          </fieldset>
          <fieldset class="settings-group">
            <legend>今日练习（错题）</legend>
            <label>
              英语错题
              <input name="questionEnglish" type="number" min="0" max="200" step="1" value="3" required />
            </label>
            <label>
              数学错题
              <input name="questionMath" type="number" min="0" max="200" step="1" value="3" required />
            </label>
          </fieldset>
        </div>
        <div class="settings-actions">
          <div id="settingsStatus" class="settings-status"></div>
          <button type="submit">保存数量</button>
        </div>
      </form>
    </section>
    <section class="panel">
    <form id="uploadForm">
      <div class="form-grid">
      <label>
        分类
        <select name="category" required>
          <option value="english_homework">英语作业（每日练习和复习）</option>
          <option value="math_homework">数学作业（每日练习和复习）</option>
          <option value="english_words">英语单词</option>
          <option value="math_words">数学单词</option>
          <option value="english_questions">英语错题</option>
          <option value="math_questions">数学错题</option>
          <option value="english_interview">英文面试</option>
          <option value="chinese_interview">中文面试</option>
          <option value="mixed" selected>混合分类（多种种类合并，文档内需标注清楚类别）</option>
        </select>
      </label>
      <label>
        备注
        <textarea name="note" placeholder="如文件中无法识别具体分类，可补充具体分类，或其他备注信息。"></textarea>
      </label>
      <label class="wide">
        文件
        <input name="files" id="files" type="file" accept=".doc,.docx,.xls,.xlsx,.csv,.pdf,.txt,.jpg,.jpeg,.png,.webp,.gif,.bmp,.tif,.tiff,.heic,.heif,image/*" multiple required />
      </label>
      </div>
      <div class="file-types">可一次选择多份。<br />支持文件类型：Word（.doc/.docx）、Excel/表格（.xls/.xlsx/.csv）、PDF（.pdf）、文本（.txt）、图片（.jpg/.jpeg/.png/.webp/.gif/.bmp/.tif/.tiff/.heic/.heif）。JPG/PNG/WebP 图片会自动压缩后上传。</div>
      <div id="fileInfo" class="file-info error">！未选择文件</div>
      <div class="submit-row">
        <div id="status" class="status"></div>
        <button type="submit">上传</button>
      </div>
      <section id="uploadedList" class="uploaded" aria-live="polite"></section>
    </form>
    </section>
  </main>
  <script>
    const UPLOAD_URL = "https://teacher-upload.43.128.89.2.sslip.io/upload";
    const form = document.getElementById("uploadForm");
    const settingsForm = document.getElementById("settingsForm");
    const statusEl = document.getElementById("status");
    const settingsStatusEl = document.getElementById("settingsStatus");
    const filesEl = document.getElementById("files");
    const fileInfoEl = document.getElementById("fileInfo");
    const uploadedListEl = document.getElementById("uploadedList");

    loadTodayUploads();
    loadPracticeSettings();

    filesEl.addEventListener("change", () => {
      const files = Array.from(filesEl.files || []);
      if (!files.length) {
        fileInfoEl.className = "file-info error";
        fileInfoEl.textContent = "！未选择文件";
        return;
      }
      const total = files.reduce((sum, file) => sum + (file.size || 0), 0);
      const names = files.slice(0, 3).map((file) => file.name).join("、");
      const more = files.length > 3 ? ` 等 ${files.length} 份` : "";
      fileInfoEl.className = "file-info";
      fileInfoEl.textContent = `已选 ${files.length} 份，约 ${(total / 1024 / 1024).toFixed(2)} MB：${names}${more}`;
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = form.querySelector("button");
      const originalFiles = Array.from(filesEl.files || []);
      const selectedFiles = originalFiles.map((file) => ({
        originalName: file.name,
        size: file.size || 0
      }));
      button.disabled = true;
      statusEl.className = "status";
      statusEl.textContent = "正在准备文件...";
      try {
        const preparedFiles = await prepareFilesForUpload(originalFiles, (message) => {
          statusEl.textContent = message;
        });
        const formData = new FormData();
        formData.append("category", form.elements.category.value);
        formData.append("note", form.elements.note.value || "");
        for (const file of preparedFiles) {
          formData.append("files", file, file.name);
        }
        const originalTotal = originalFiles.reduce((sum, file) => sum + (file.size || 0), 0);
        const uploadTotal = preparedFiles.reduce((sum, file) => sum + (file.size || 0), 0);
        const saved = originalTotal - uploadTotal;
        statusEl.textContent = saved > 256 * 1024
          ? `已压缩 ${(saved / 1024 / 1024).toFixed(1)} MB，正在上传...`
          : "正在上传...";
        const response = await fetch(UPLOAD_URL, {
          method: "POST",
          body: formData
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.error || "上传失败");
        }
        statusEl.className = "status ok";
        statusEl.textContent = `上传成功：${result.count || 0} 个文件`;
        const refreshed = await loadTodayUploads();
        if (!refreshed) renderUploadedFiles(mergeUploadedFiles(result.files || [], selectedFiles));
        form.reset();
        fileInfoEl.className = "file-info error";
        fileInfoEl.textContent = "！未选择文件";
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = error.message || "上传失败";
      } finally {
        button.disabled = false;
      }
    });

    settingsForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = settingsForm.querySelector("button");
      button.disabled = true;
      settingsStatusEl.className = "settings-status";
      settingsStatusEl.textContent = "正在保存数量设置...";
      try {
        const settings = readSettingsForm();
        const response = await fetch(settingsUrl(), {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({ practiceSettings: settings })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.error || "保存数量设置失败");
        }
        applyPracticeSettings(result.practiceSettings || settings);
        settingsStatusEl.className = "settings-status ok";
        settingsStatusEl.textContent = settingsSummaryText(result.practiceSettings || settings, "已保存");
      } catch (error) {
        settingsStatusEl.className = "settings-status error";
        settingsStatusEl.textContent = error.message || "保存数量设置失败";
      } finally {
        button.disabled = false;
      }
    });

    function settingsUrl() {
      return `${UPLOAD_URL}/settings`;
    }

    function settingNumber(value, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.max(0, Math.min(200, Math.round(number)));
    }

    function readSettingsForm() {
      return {
        dailyTargets: {
          englishSpelling: settingNumber(settingsForm.elements.dailyEnglishSpelling.value, 15),
          englishRecognition: settingNumber(settingsForm.elements.dailyEnglishRecognition.value, 30),
          mathSpelling: settingNumber(settingsForm.elements.dailyMathSpelling.value, 15),
          mathRecognition: settingNumber(settingsForm.elements.dailyMathRecognition.value, 30)
        },
        passedReviewTargets: {
          englishSpelling: settingNumber(settingsForm.elements.reviewEnglishSpelling.value, 5),
          englishRecognition: settingNumber(settingsForm.elements.reviewEnglishRecognition.value, 5),
          mathSpelling: settingNumber(settingsForm.elements.reviewMathSpelling.value, 5),
          mathRecognition: settingNumber(settingsForm.elements.reviewMathRecognition.value, 5)
        },
        questionTargets: {
          english: settingNumber(settingsForm.elements.questionEnglish.value, 3),
          math: settingNumber(settingsForm.elements.questionMath.value, 3)
        }
      };
    }

    function applyPracticeSettings(settings) {
      const normalized = normalizePracticeSettings(settings || {});
      const daily = normalized.dailyTargets;
      const review = normalized.passedReviewTargets;
      const questions = normalized.questionTargets;
      settingsForm.elements.dailyEnglishSpelling.value = String(daily.englishSpelling);
      settingsForm.elements.dailyEnglishRecognition.value = String(daily.englishRecognition);
      settingsForm.elements.dailyMathSpelling.value = String(daily.mathSpelling);
      settingsForm.elements.dailyMathRecognition.value = String(daily.mathRecognition);
      settingsForm.elements.reviewEnglishSpelling.value = String(review.englishSpelling);
      settingsForm.elements.reviewEnglishRecognition.value = String(review.englishRecognition);
      settingsForm.elements.reviewMathSpelling.value = String(review.mathSpelling);
      settingsForm.elements.reviewMathRecognition.value = String(review.mathRecognition);
      settingsForm.elements.questionEnglish.value = String(questions.english);
      settingsForm.elements.questionMath.value = String(questions.math);
      const updatedDate = settings && settings.updatedAt ? new Date(settings.updatedAt) : null;
      const updatedAt = updatedDate && !Number.isNaN(updatedDate.getTime()) ? `，更新时间 ${formatDateTime(updatedDate)}` : "";
      settingsStatusEl.className = "settings-status";
      settingsStatusEl.textContent = `${settingsSummaryText(normalized, "当前设置")}${updatedAt}`;
    }

    function normalizePracticeSettings(settings) {
      return {
        dailyTargets: normalizeTargets(settings.dailyTargets, {
          englishSpelling: 15,
          englishRecognition: 30,
          mathSpelling: 15,
          mathRecognition: 30
        }, settings.dailyPracticeTargetTotal),
        passedReviewTargets: normalizeTargets(settings.passedReviewTargets, {
          englishSpelling: 5,
          englishRecognition: 5,
          mathSpelling: 5,
          mathRecognition: 5
        }, settings.passedReviewTargetTotal),
        questionTargets: normalizeQuestionTargets(settings.questionTargets)
      };
    }

    function normalizeQuestionTargets(value) {
      return {
        english: settingNumber(value && value.english, 3),
        math: settingNumber(value && value.math, 3)
      };
    }

    function normalizeTargets(value, defaults, legacyTotal) {
      if (value && typeof value === "object") {
        return {
          englishSpelling: settingNumber(value.englishSpelling, defaults.englishSpelling),
          englishRecognition: settingNumber(value.englishRecognition, defaults.englishRecognition),
          mathSpelling: settingNumber(value.mathSpelling, defaults.mathSpelling),
          mathRecognition: settingNumber(value.mathRecognition, defaults.mathRecognition)
        };
      }
      if (legacyTotal !== undefined) return allocateTargets(defaults, settingNumber(legacyTotal, sumTargets(defaults)));
      return { ...defaults };
    }

    function allocateTargets(defaults, total) {
      const entries = Object.entries(defaults);
      const defaultTotal = sumTargets(defaults);
      if (defaultTotal <= 0) return Object.fromEntries(entries.map(([key]) => [key, 0]));
      const targetTotal = Math.max(0, Math.round(total));
      const allocated = entries.map(([key, value], index) => {
        const exact = (value / defaultTotal) * targetTotal;
        return { key, index, value: Math.floor(exact), remainder: exact - Math.floor(exact) };
      });
      let remaining = targetTotal - allocated.reduce((sum, item) => sum + item.value, 0);
      allocated
        .sort((a, b) => b.remainder - a.remainder || a.index - b.index)
        .forEach((item) => {
          if (remaining <= 0) return;
          item.value += 1;
          remaining -= 1;
        });
      return Object.fromEntries(allocated.map(({ key, value }) => [key, value]));
    }

    function sumTargets(targets) {
      return Object.values(targets || {}).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function settingsSummaryText(settings, prefix) {
      const normalized = normalizePracticeSettings(settings || {});
      const daily = normalized.dailyTargets;
      const review = normalized.passedReviewTargets;
      const questions = normalized.questionTargets;
      return `${prefix}：测试 英语默写${daily.englishSpelling}、英语认读${daily.englishRecognition}、数学默写${daily.mathSpelling}、数学认读${daily.mathRecognition}；复习 英语默写${review.englishSpelling}、英语认读${review.englishRecognition}、数学默写${review.mathSpelling}、数学认读${review.mathRecognition}；错题 英语错题${questions.english}、数学错题${questions.math}`;
    }

    async function loadPracticeSettings() {
      try {
        const response = await fetch(settingsUrl(), { method: "GET", cache: "no-store" });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "读取数量设置失败");
        applyPracticeSettings(result.practiceSettings || {});
      } catch {
        applyPracticeSettings({});
      }
    }

    async function prepareFilesForUpload(files, updateStatus) {
      const prepared = [];
      for (let index = 0; index < files.length; index += 1) {
        const file = files[index];
        updateStatus(`正在准备 ${index + 1}/${files.length}：${file.name}`);
        prepared.push(await compressImageIfUseful(file));
      }
      return prepared;
    }

    async function compressImageIfUseful(file) {
      if (!shouldCompressImage(file)) return file;
      try {
        const bitmap = await createImageBitmap(file);
        const maxSide = 1600;
        const scale = Math.min(1, maxSide / Math.max(bitmap.width, bitmap.height));
        if (scale >= 1 && file.size < 900 * 1024) {
          bitmap.close();
          return file;
        }
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(bitmap.width * scale));
        canvas.height = Math.max(1, Math.round(bitmap.height * scale));
        const context = canvas.getContext("2d", { alpha: false });
        context.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
        bitmap.close();
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", 0.82));
        if (!blob || blob.size >= file.size * 0.92) return file;
        return new File([blob], jpgName(file.name), {
          type: "image/jpeg",
          lastModified: file.lastModified || Date.now()
        });
      } catch {
        return file;
      }
    }

    function shouldCompressImage(file) {
      const type = String(file.type || "").toLowerCase();
      const name = String(file.name || "").toLowerCase();
      if (type === "image/jpeg" || type === "image/png" || type === "image/webp") return true;
      return /\.(jpe?g|png|webp)$/i.test(name);
    }

    function jpgName(name) {
      const clean = String(name || "image").replace(/\.[^.]+$/, "");
      return `${clean || "image"}.jpg`;
    }

    function mergeUploadedFiles(uploadedFiles, selectedFiles) {
      const merged = [...uploadedFiles];
      const seen = new Set(uploadedFiles.map((file) => readableFilename(file.originalName || file.name || "")));
      for (const selected of selectedFiles) {
        if (seen.has(selected.originalName)) continue;
        merged.push({
          originalName: selected.originalName,
          size: selected.size,
          pendingOnly: true
        });
      }
      return merged;
    }

    async function loadTodayUploads() {
      try {
        const response = await fetch(UPLOAD_URL, { method: "GET", cache: "no-store" });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "读取已上传文件失败");
        if (result.practiceSettings) applyPracticeSettings(result.practiceSettings);
        renderUploadedFiles(result.files || [], { showEmpty: true, day: result.day });
        return true;
      } catch {
        return false;
      }
    }

    function renderUploadedFiles(files, options = {}) {
      const updatedText = escapeHtml(latestUpdateText(files, options.day));
      if (!files.length) {
        if (options.showEmpty) {
          uploadedListEl.className = "uploaded active";
          uploadedListEl.innerHTML = `<div class="uploaded-title"><span>今日已上传文件</span><span class="uploaded-meta">（所有老师可见，可删除；“查看单个文件”只打开这一份，生成练习会自动拉取全部）${updatedText}</span></div><div class="uploaded-empty">今天还没有上传文件。</div>`;
        } else {
          uploadedListEl.className = "uploaded";
          uploadedListEl.innerHTML = "";
        }
        return;
      }
      uploadedListEl.className = "uploaded active";
      uploadedListEl.innerHTML = [
        `<div class="uploaded-title"><span>今日已上传文件</span><span class="uploaded-meta">（所有老师可见，可删除；“查看单个文件”只打开这一份，生成练习会自动拉取全部）${updatedText}</span></div>`,
        ...files.map((file, index) => {
          const label = escapeHtml(readableFilename(file.originalName || file.name || `文件 ${index + 1}`));
          const path = escapeHtml(file.deletePath || "");
          const pendingOnly = file.pendingOnly || !file.deletePath;
          const viewHref = fileDownloadHref(file);
          const viewLink = viewHref
            ? `<a class="view-file" href="${escapeHtml(viewHref)}" target="_blank" rel="noopener" title="只打开/下载这一个文件，不会批量拉取全部文件">查看单个文件</a>`
            : `<span class="view-file disabled" title="只打开/下载这一个文件，不会批量拉取全部文件">查看单个文件</span>`;
          const timeText = formatUploadTime(file.uploadedAt);
          const state = pendingOnly ? "已上传（待服务器返回删除信息）" : `${timeText ? `${timeText} ` : ""}已上传`;
          return `<div class="uploaded-item" data-delete-path="${path}">
            <div>
              <div class="uploaded-name">${label}</div>
              <div class="uploaded-state">${state}</div>
            </div>
            <div class="uploaded-actions">
              ${viewLink}
              <button class="delete-file" type="button"${pendingOnly ? " disabled" : ""}>删除</button>
            </div>
          </div>`;
        })
      ].join("");
    }

    function fileDownloadHref(file) {
      if (file.downloadUrl) return file.downloadUrl;
      const path = file.downloadPath || file.deletePath;
      if (!path) return "";
      return `${UPLOAD_URL}/file?path=${encodeURIComponent(path)}`;
    }

    uploadedListEl.addEventListener("click", async (event) => {
      const button = event.target.closest(".delete-file");
      if (!button) return;
      const item = button.closest(".uploaded-item");
      const deletePath = item ? item.dataset.deletePath : "";
      const stateEl = item ? item.querySelector(".uploaded-state") : null;
      if (!deletePath) return;

      button.disabled = true;
      if (stateEl) stateEl.textContent = "正在删除...";
      try {
        const response = await fetch(UPLOAD_URL, {
          method: "DELETE",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({ path: deletePath })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.error || "删除失败");
        }
        if (stateEl) stateEl.textContent = "已删除";
        button.textContent = "已删";
        await loadTodayUploads();
      } catch (error) {
        if (stateEl) stateEl.textContent = error.message || "删除失败";
        button.disabled = false;
      }
    });

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function readableFilename(value) {
      const raw = String(value || "");
      try {
        const bytes = Uint8Array.from(raw, (char) => char.charCodeAt(0) & 255);
        const decoded = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
        return /[\u3400-\u9fff]/.test(decoded) ? decoded : raw;
      } catch {
        return raw;
      }
    }

    function formatUploadTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function todayDateText() {
      const date = new Date();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function latestUpdateText(files, fallbackDay) {
      const timestamps = files
        .map((file) => new Date(file.uploadedAt || "").getTime())
        .filter((time) => !Number.isNaN(time));
      if (timestamps.length) {
        return `最近更新：${formatDateTime(new Date(Math.max(...timestamps)))}`;
      }
      return `最近更新：${fallbackDay || todayDateText()}`;
    }

    function formatDateTime(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${year}-${month}-${day} ${hours}:${minutes}`;
    }
  </script>
</body>
